services:
  mysql-test:
    image: docker.m.daocloud.io/library/mysql:8.0
    pull_policy: if_not_present
    container_name: iot-mysql-test
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME:-iot_platform}
    volumes:
      - mysql_data_test:/var/lib/mysql
    ports:
      - "3308:3306"
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "sh", "-c", "mysqladmin ping -h localhost -u root -p$$MYSQL_ROOT_PASSWORD"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  backend-test:
    build:
      context: ./iot_control_platform
      dockerfile: Dockerfile
    container_name: iot-backend-test
    environment:
      - DJANGO_SETTINGS_MODULE=config.settings
      - DB_USE_MYSQL=true
      - DB_NAME=${DB_NAME:-iot_platform}
      - DB_USER=${DB_USER:-root}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_HOST=mysql-test
      - DB_PORT=3306
      - MQTT_CLIENT_ID_SUFFIX=test
      - PYTHONDONTWRITEBYTECODE=1
    volumes:
      - ./iot_control_platform:/app
    command: >
      sh -c "python manage.py migrate --noinput &&
        python manage.py configure --init --no-reload &&
        python manage.py runserver 0.0.0.0:8000"
    env_file:
      - .env
    depends_on:
      mysql-test:
        condition: service_healthy
    ports:
      - "8181:8000"
    restart: unless-stopped

  frontend-test:
    image: node:20-alpine
    container_name: iot-frontend-test
    working_dir: /app
    volumes:
      - ./frontend:/app
      - frontend_node_modules_test:/app/node_modules
    environment:
      - VITE_API_PROXY_TARGET=http://backend-test:8000
    command: >
      sh -c "npm config set registry https://registry.npmmirror.com &&
        (test -d node_modules/vite || npm install) &&
        npx vite --host 0.0.0.0 --port 5173"
    ports:
      - "8180:5173"
    depends_on:
      - backend-test
    restart: unless-stopped

volumes:
  mysql_data_test:
  frontend_node_modules_test:
