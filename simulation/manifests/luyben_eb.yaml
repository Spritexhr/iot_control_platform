    fields:
      level: {waveform: {type: sine, min: 48.0, max: 52.0, period: 1200, jitter: 0.2, phase: 400}, precision: 1, unit: "%"}

  - module: generic_sensor
    id: LI0204
    sampling_interval: 5
    status_report_interval: 30
    fields:
      level: {waveform: {type: sine, min: 48.0, max: 52.0, period: 1200, jitter: 0.2, phase: 600}, precision: 1, unit: "%"}

  - module: generic_sensor
    id: AI0201
    sampling_interval: 10
    status_report_interval: 30
    fields:
      eb_mol_fraction: {waveform: {type: sine, min: 0.9985, max: 0.9995, period: 3600, jitter: 0.00005, phase: 300}, precision: 5, unit: mol_fraction}

  # ========================================================================
  # 执行器 - 命令只更新自身状态并回传 check_code，不反向改变传感器波形
  # ========================================================================

  - module: generic_device
    id: FV0102
    status_report_interval: 30
    state_fields:
      opening: {type: float, initial: 50.0, min: 0.0, max: 100.0}

  - module: generic_device
    id: FV0103
    status_report_interval: 30
    state_fields:
      opening: {type: float, initial: 50.0, min: 0.0, max: 100.0}

  - module: generic_device
    id: LV0101
    status_report_interval: 30
