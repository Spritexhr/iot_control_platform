      opening: {type: float, initial: 50.0, min: 0.0, max: 100.0}

  - module: generic_device
    id: PIC0107
    status_report_interval: 30
    state_fields:
      setpoint: {type: float, initial: 414.9, min: 350.0, max: 450.0}

  - module: generic_device
    id: PV0201
    status_report_interval: 30
    state_fields:
      duty: {type: float, initial: 50.0, min: 0.0, max: 100.0}

  - module: generic_device
