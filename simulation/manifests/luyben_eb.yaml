  - module: generic_sensor
    id: FI0205
    sampling_interval: 5
    status_report_interval: 30
    fields:
      flow_rate: {waveform: {type: sine, min: 410.0, max: 426.0, period: 1800, jitter: 0.8, phase: 1080}, precision: 1, unit: kmol/h}

  - module: generic_sensor
    id: FI0206
    sampling_interval: 5
    status_report_interval: 30
    fields:
      flow_rate: {waveform: {type: sine, min: 625.0, max: 636.2, period: 1800, jitter: 0.8, phase: 1200}, precision: 1, unit: kmol/h}

  - module: generic_sensor
    id: FI0207
    sampling_interval: 5
    status_report_interval: 30
    fields:
      flow_rate: {waveform: {type: sine, min: 245.0, max: 257.0, period: 1800, jitter: 0.6, phase: 1320}, precision: 1, unit: kmol/h}

  # 02 乙苯分离车间 - 压力、温度、液位、产品组分

  - module: generic_sensor
    id: PI0201
    sampling_interval: 5
    status_report_interval: 30
    fields:
      pressure: {waveform: {type: sine, min: 0.295, max: 0.305, period: 1200, jitter: 0.001, phase: 0}, precision: 3, unit: atm}

  - module: generic_sensor
    id: PI0202
    sampling_interval: 5
    status_report_interval: 30
    fields:
      pressure: {waveform: {type: sine, min: 0.098, max: 0.102, period: 1200, jitter: 0.0005, phase: 300}, precision: 3, unit: atm}

  - module: generic_sensor
    id: TI0201
    sampling_interval: 5
    status_report_interval: 30
    fields:
      temperature: {waveform: {type: sine, min: 364.8, max: 366.8, period: 1800, jitter: 0.1, phase: 0}, precision: 1, unit: K}

  - module: generic_sensor
    id: TI0202
    sampling_interval: 5
    status_report_interval: 30
    fields:
      temperature: {waveform: {type: sine, min: 393.5, max: 395.5, period: 1800, jitter: 0.1, phase: 450}, precision: 1, unit: K}

  - module: generic_sensor
    id: LI0201
    sampling_interval: 5
    status_report_interval: 30
    fields:
      level: {waveform: {type: sine, min: 48.0, max: 52.0, period: 1200, jitter: 0.2, phase: 0}, precision: 1, unit: "%"}

  - module: generic_sensor
    id: LI0202
    sampling_interval: 5
