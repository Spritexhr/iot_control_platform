# Luyben 乙苯流程教学模拟节点
#
# 范围：EB Project 的 01 制乙苯车间 + 02 乙苯分离车间。
# 目标：为 P&ID、趋势、ControlScheme 和 AutomationRule 提供独立虚拟信号。
# 注意：各传感器波形彼此独立，执行器命令只更新自身状态，不建立工艺耦合。
#
# 校验：python simulation/run.py --check -m luyben_eb
# 启动：python simulation/run.py -m luyben_eb

name: luyben_eb
description: Luyben 乙苯两反应器、两精馏塔教学模拟（38 个传感器 + 15 个执行器）

nodes:

  # ========================================================================
  # 01 制乙苯车间 - 流量（按物料方向 0101 → 0106）
  # ========================================================================

  - module: generic_sensor
    id: FI0101
    sampling_interval: 5
    status_report_interval: 30
    fields:
      flow_rate: {waveform: {type: sine, min: 960.0, max: 978.8, period: 1800, jitter: 1.0, phase: 0}, precision: 1, unit: kmol/h}

  - module: generic_sensor
    id: FI0102
    sampling_interval: 5
    status_report_interval: 30
    fields:
      flow_rate: {waveform: {type: sine, min: 625.0, max: 636.2, period: 1800, jitter: 0.8, phase: 120}, precision: 1, unit: kmol/h}

  - module: generic_sensor
    id: FI0103
    sampling_interval: 5
    status_report_interval: 30
    fields:
      flow_rate: {waveform: {type: sine, min: 625.0, max: 636.2, period: 1800, jitter: 0.8, phase: 240}, precision: 1, unit: kmol/h}

  - module: generic_sensor
    id: FI0104
    sampling_interval: 5
    status_report_interval: 30
    fields:
      flow_rate: {waveform: {type: sine, min: 1680.0, max: 1712.0, period: 1800, jitter: 1.5, phase: 360}, precision: 1, unit: kmol/h}

  - module: generic_sensor
    id: FI0105
    sampling_interval: 5
    status_report_interval: 30
    fields:
      flow_rate: {waveform: {type: sine, min: 245.0, max: 257.0, period: 1800, jitter: 0.6, phase: 480}, precision: 1, unit: kmol/h}

  - module: generic_sensor
    id: FI0106
    sampling_interval: 5
    status_report_interval: 30
    fields:
      flow_rate: {waveform: {type: sine, min: 1860.0, max: 1904.0, period: 1800, jitter: 2.0, phase: 600}, precision: 1, unit: kmol/h}

  # 01 制乙苯车间 - 压力

  - module: generic_sensor
    id: PI0101
    sampling_interval: 5
    status_report_interval: 30
    fields:
      pressure: {waveform: {type: sine, min: 19.7, max: 20.1, period: 1500, jitter: 0.03, phase: 0}, precision: 2, unit: atm}

  - module: generic_sensor
    id: PI0102
    sampling_interval: 5
    status_report_interval: 30
    fields:
      pressure: {waveform: {type: sine, min: 19.7, max: 20.1, period: 1500, jitter: 0.03, phase: 100}, precision: 2, unit: atm}

  - module: generic_sensor
    id: PI0103
    sampling_interval: 5
    status_report_interval: 30
    fields:
      pressure: {waveform: {type: sine, min: 19.8, max: 20.2, period: 1500, jitter: 0.03, phase: 200}, precision: 2, unit: atm}

  - module: generic_sensor
    id: PI0104
    sampling_interval: 5
    status_report_interval: 30
    fields:
      pressure: {waveform: {type: sine, min: 19.8, max: 20.2, period: 1500, jitter: 0.03, phase: 300}, precision: 2, unit: atm}

  - module: generic_sensor
    id: PI0105
    sampling_interval: 5
    status_report_interval: 30
    fields:
      pressure: {waveform: {type: sine, min: 18.7, max: 19.1, period: 1500, jitter: 0.03, phase: 400}, precision: 2, unit: atm}

  - module: generic_sensor
    id: PI0106
    sampling_interval: 5
    status_report_interval: 30
    fields:
      pressure: {waveform: {type: sine, min: 18.8, max: 19.2, period: 1500, jitter: 0.03, phase: 500}, precision: 2, unit: atm}

  - module: generic_sensor
    id: PI0107
    sampling_interval: 5
    status_report_interval: 30
    fields:
      pressure: {waveform: {type: sine, min: 2.45, max: 2.55, period: 1200, jitter: 0.01, phase: 0}, precision: 2, unit: atm}

  # 01 制乙苯车间 - 温度

  - module: generic_sensor
    id: TI0101
    sampling_interval: 5
    status_report_interval: 30
    fields:
      temperature: {waveform: {type: sine, min: 312.0, max: 316.0, period: 1800, jitter: 0.2, phase: 0}, precision: 1, unit: K}

  - module: generic_sensor
    id: TI0102
    sampling_interval: 5
    status_report_interval: 30
    fields:
      temperature: {waveform: {type: sine, min: 318.0, max: 322.0, period: 1800, jitter: 0.2, phase: 100}, precision: 1, unit: K}

  - module: generic_sensor
    id: TI0103
    sampling_interval: 5
    status_report_interval: 30
    fields:
      temperature: {waveform: {type: sine, min: 318.0, max: 322.0, period: 1800, jitter: 0.2, phase: 200}, precision: 1, unit: K}

  - module: generic_sensor
    id: TI0104
    sampling_interval: 5
    status_report_interval: 30
    fields:
      temperature: {waveform: {type: sine, min: 432.7, max: 434.7, period: 1800, jitter: 0.15, phase: 300}, precision: 1, unit: K}

  - module: generic_sensor
    id: TI0105
    sampling_interval: 5
    status_report_interval: 30
    fields:
      temperature: {waveform: {type: sine, min: 405.0, max: 409.0, period: 1800, jitter: 0.2, phase: 400}, precision: 1, unit: K}

  - module: generic_sensor
    id: TI0106
    sampling_interval: 5
    status_report_interval: 30
    fields:
      temperature: {waveform: {type: sine, min: 431.0, max: 433.0, period: 1800, jitter: 0.15, phase: 500}, precision: 1, unit: K}

  # 01 制乙苯车间 - 液位与组分

  - module: generic_sensor
    id: LI0101
    sampling_interval: 5
    status_report_interval: 30
    fields:
      level: {waveform: {type: sine, min: 48.0, max: 52.0, period: 1200, jitter: 0.2, phase: 0}, precision: 1, unit: "%"}

  - module: generic_sensor
    id: LI0102
    sampling_interval: 5
    status_report_interval: 30
    fields:
      level: {waveform: {type: sine, min: 48.0, max: 52.0, period: 1200, jitter: 0.2, phase: 300}, precision: 1, unit: "%"}

  - module: generic_sensor
    id: AI0101
    sampling_interval: 10
    status_report_interval: 30
    fields:
      deb_mol_fraction: {waveform: {type: sine, min: 0.0, max: 0.002, period: 3600, jitter: 0.0001, phase: 0}, precision: 5, unit: mol_fraction}

  # ========================================================================
  # 02 乙苯分离车间 - C1/C2 流量
  # ========================================================================

  - module: generic_sensor
    id: FI0201
    sampling_interval: 5
    status_report_interval: 30
    fields:
