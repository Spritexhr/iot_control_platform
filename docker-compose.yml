services:
  mysql:
    image: docker.m.daocloud.io/library/mysql:8.0
    pull_policy: if_not_present
    container_name: iot-mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME:-iot_platform}
    volumes:
      - mysql_data:/var/lib/mysql
    ports:
      - "${MYSQL_HOST_PORT:-3307}:3306"
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "sh", "-c", "mysqladmin ping -h localhost -u root -p$$MYSQL_ROOT_PASSWORD"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  redis:
    image: docker.m.daocloud.io/library/redis:7-alpine
    pull_policy: if_not_present
    container_name: iot-redis
    command: ["redis-server", "--save", "60", "1", "--loglevel", "warning"]
    volumes:
      - redis_data:/data
    ports:
      - "${REDIS_HOST_PORT:-6379}:6379"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./iot_control_platform
      dockerfile: Dockerfile
    container_name: iot-backend
    environment:
      - DJANGO_SETTINGS_MODULE=config.settings
      - DB_USE_MYSQL=true
      - DB_NAME=${DB_NAME:-iot_platform}
      - DB_USER=${DB_USER:-root}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_HOST=mysql
      - DB_PORT=3306
      - REDIS_URL=redis://redis:6379/0
      # web worker 不跑 MQTT 客户端，避免 N 个 worker 重复处理消息
      # MQTT 由独立的 mqtt_runner service 统一处理
      - IOT_MQTT_RUNNER=false
    command:
      - sh
      - -c
      - >-
        python manage.py migrate --noinput &&
        python manage.py configure --init --no-reload &&
        python manage.py collectstatic --noinput &&
        gunicorn config.asgi:application
        --bind 0.0.0.0:8000
        --workers 2
        --worker-class uvicorn.workers.UvicornWorker
    env_file:
      - .env
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "0.0.0.0:${ADMIN_PORT:-48081}:8000"
    restart: unless-stopped
    healthcheck:
      # gunicorn 真正监听端口前，必须先跑完 migrate + configure --init，
      # 用此 healthcheck 让 mqtt_runner 等到 platform_settings 配置写入后才启动
      test: ["CMD", "python", "-c", "import socket; socket.create_connection(('localhost', 8000), 2).close()"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 10s

  mqtt_runner:
    build:
      context: ./iot_control_platform
      dockerfile: Dockerfile
    container_name: iot-mqtt-runner
    environment:
      - DJANGO_SETTINGS_MODULE=config.settings
      - DB_USE_MYSQL=true
      - DB_NAME=${DB_NAME:-iot_platform}
      - DB_USER=${DB_USER:-root}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_HOST=mysql
      - DB_PORT=3306
      - REDIS_URL=redis://redis:6379/0
    command: ["python", "manage.py", "mqtt_runner"]
    env_file:
      - .env
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      backend:
        # 等 backend 的 healthcheck 通过（即 migrate + configure --init 已完成、gunicorn 已监听）
        # 才启动，避免读到 platform_settings 默认值（127.0.0.1）
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: iot-frontend
    ports:
      - "0.0.0.0:${FRONTEND_PORT:-48080}:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  mysql_data:
  redis_data:
